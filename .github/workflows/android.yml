name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Install Dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Build Project
      env:
        PORT: 3000
        BASE_PATH: "/"
        DATABASE_URL: "file:./dev.db"
      run: pnpm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Android App
      run: |
        # ساخت پوشه خروجی وب برای جلوگیری از خطای سینک کپی‌سیتر
        mkdir -p dist || mkdir -p build || mkdir -p out || true
        
        # اجرای دستورات کپی‌سیتر با pnpm exec جهت دسترسی به پکیج‌های مونو‌ریپو
        pnpm exec cap android add || true
        pnpm exec cap sync android || true
        
        # پیدا کردن پوشه گریدل اندروید و کامپایل نهایی
        FINAL_ANDROID=$(find . -name "gradlew" -exec dirname {} \; | head -n 1)
        if [ -n "$FINAL_ANDROID" ]; then
          echo "ورود به پوشه اندروید: $FINAL_ANDROID"
          cd "$FINAL_ANDROID"
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "خطا: پوشه اندروید حاوی فایل gradlew یافت نشد!" && exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
