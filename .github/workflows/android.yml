name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Install Dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Build Project
      run: pnpm run build -- --filter client || pnpm run build || true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Android App
      run: |
        # پیدا کردن پوشه‌ای که کپی‌سیتر در آن قرار دارد
        CAP_DIR=$(find . -name "capacitor.config.*" -exec dirname {} \; | head -n 1)
        if [ -z "$CAP_DIR" ]; then
          CAP_DIR="."
        fi
        echo "Capacitor directory found at: $CAP_DIR"
        cd "$CAP_DIR"
        
        # نصب محلی ابزارها در پوشه هدف برای اطمینان از اجرای دستورات
        pnpm add @capacitor/cli @capacitor/core @capacitor/android || npm install @capacitor/cli @capacitor/core @capacitor/android
        
        # ساخت و همگام‌سازی پوشه اندروید
        npx cap android add || true
        mkdir -p dist || mkdir -p build || mkdir -p out || true
        npx cap sync android || true
        
        # ورود به پوشه اندروید ساخته شده و اجرای گریدل
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
