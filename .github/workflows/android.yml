name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Install Dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Build Project
      env:
        PORT: 3000
        BASE_PATH: "/"
        DATABASE_URL: "file:./dev.db"
      run: pnpm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Android App
      run: |
        # پیدا کردن مسیر دقیق پوشه فرانت‌اَند در کل پروژه
        TARGET_DIR=$(find . -type d -name "trademind-os" | head -n 1)
        
        if [ -z "$TARGET_DIR" ]; then
          echo "پوشه پروژه پیدا نشد! تلاش برای پیدا کردن پوشه ریشه با تنظیمات کپی‌سیتر..."
          TARGET_DIR=$(find . -name "capacitor.config.*" -exec dirname {} \; | head -n 1)
        fi
        
        if [ -z "$TARGET_DIR" ]; then
          TARGET_DIR="."
        fi
        
        echo "ورود به پوشه هدف در مسیر: $TARGET_DIR"
        cd "$TARGET_DIR"
        
        # اجرای دستورات کپی‌سیتر
        npx cap android add || true
        npx cap sync android || true
        
        # پیدا کردن و ورود به پوشه اندروید برای اجرای گریدل
        FINAL_ANDROID=$(find . -name "gradlew" -exec dirname {} \; | head -n 1)
        if [ -n "$FINAL_ANDROID" ]; then
          cd "$FINAL_ANDROID"
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "خطا: پوشه اندروید حاوی فایل gradlew یافت نشد!" && exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
          
