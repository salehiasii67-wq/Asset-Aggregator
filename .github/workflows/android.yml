name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Install Dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Build Project
      env:
        PORT: 3000
        BASE_PATH: "/"
        DATABASE_URL: "file:./dev.db"
      run: pnpm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Android App
      run: |
        # ایجاد پوشه‌های فرضی خروجی وب
        mkdir -p dist || mkdir -p build || mkdir -p out || true
        
        # اجرای خروجی کپی‌سیتر 
        npx cap android add || true
        npx cap sync android || true
        
        # بررسی وجود پوشه اندروید و اجرای گریدل
        if [ -d "android" ]; then
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          # اگر در ریشه نبود، سرچ عمیق انجام می‌دهد
          ANDROID_DIR=$(find . -name "gradlew" -exec dirname {} \; | head -n 1)
          if [ -n "$ANDROID_DIR" ]; then
            cd "$ANDROID_DIR"
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "پوشه اندروید یافت نشد!" && exit 1
          fi
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
          
