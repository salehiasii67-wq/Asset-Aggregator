name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Install Dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Build Project
      run: pnpm run build -- --filter client || pnpm run build || true

    - name: Install & Sync Capacitor
      run: |
        # نصب سراسری ابزار کپی‌سیتر
        pnpm add -g @capacitor/cli @capacitor/core @capacitor/android || npm install -g @capacitor/cli @capacitor/core @capacitor/android
        
        # مقداردهی و سینک خودکار بدون وابستگی به پوشه خاص
        npx cap android add || true
        
        # اگر خروجی وب در پوشه dist یا build ایجاد شده باشد، سینک می‌شود
        mkdir -p dist || mkdir -p build || mkdir -p out || true
        npx cap sync android || true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build APK
      run: |
        # پیدا کردن هوشمند پوشه اندروید در هر کجای پروژه و اجرای گریدل
        ANDROID_DIR=$(find . -name "gradlew" -exec dirname {} \; | head -n 1)
        if [ -z "$ANDROID_DIR" ]; then
          echo "ساختار پیش‌فرض اندروید یافت نشد، ایجاد ساختار پایه..."
          npx cap android add || true
          ANDROID_DIR=$(find . -name "gradlew" -exec dirname {} \; | head -n 1)
        fi
        cd "$ANDROID_DIR"
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
