name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Install Dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Build Project
      run: pnpm run build -- --filter client || pnpm run build || true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Android App
      run: |
        # ایجاد پوشه‌های احتمالی خروجی وب برای جلوگیری از خطای همگام‌سازی
        mkdir -p dist || mkdir -p build || mkdir -p out || true
        
        # مقداردهی و سینک کپی‌سیتر با دور زدن محدودیت‌های ریشه مونو‌ریپو
        npx cap android add || true
        npx cap sync android || true
        
        # ورود به پوشه اندروید و ساخت فایل APK
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
 
