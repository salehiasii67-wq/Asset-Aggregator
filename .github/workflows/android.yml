name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Install Dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Build Project
      env:
        PORT: 3000
        BASE_PATH: "/"
        DATABASE_URL: "file:./dev.db"
      run: pnpm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Android App
      run: |
        # ورود مستقیم به پوشه‌ای که کدهای فرانت‌اند و کپی‌سیتر آنجا هستند
        cd artifacts/trademind-os
        
        # اجرای دستورات کپی‌سیتر مستقیماً در پوشه اصلی خودشان
        npx cap android add || true
        npx cap sync android || true
        
        # ورود به پوشه اندروید ساخته شده و اجرای گریدل
        if [ -d "android" ]; then
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "پوشه اندروید در مسیر اصلی یافت نشد!" && exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
