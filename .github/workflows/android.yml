name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build TraderMind OS
        working-directory: artifacts/tradermind-os
        run: pnpm run build
        env:
          PORT: 3000
          BASE_PATH: /

      - name: Verify Web Build
        working-directory: artifacts/tradermind-os
        run: |
          echo "Current directory:"
          pwd

          echo "Contents of dist/public:"
          ls -la dist/public

          test -f dist/public/index.html

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Sync Capacitor
        working-directory: artifacts/tradermind-os
        run: npx cap sync android

      - name: Build Android APK
        working-directory: artifacts/tradermind-os/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tradermind-os-debug-apk
          path: artifacts/tradermind-os/android/app/build/outputs/apk/debug/app-debug.apk
