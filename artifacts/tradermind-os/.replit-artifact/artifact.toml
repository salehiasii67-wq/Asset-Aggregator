kind = "web"
previewPath = "/"
title = "TraderMind OS"
version = "1.0.0"
id = "artifacts/tradermind-os"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21895

[services.development]
run = "pnpm --filter @workspace/tradermind-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tradermind-os", "run", "build" ]
serve = "static"
publicDir = "artifacts/tradermind-os/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21895"
BASE_PATH = "/"
